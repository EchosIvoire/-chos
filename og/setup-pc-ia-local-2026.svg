<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#00d9b5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines déco -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#252a3a" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#252a3a" stroke-width="1"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Tag -->
  <rect x="80" y="80" width="180" height="34" rx="17" fill="rgba(108,99,255,0.2)" stroke="#6c63ff" stroke-width="1"/>
  <text x="170" y="102" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#6c63ff" text-anchor="middle" letter-spacing="1">GUIDE TERRAIN 2026</text>

  <!-- Titre principal -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">PC IA local en 2026 :</text>
  <text x="80" y="252" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#ffffff">j'ai testé <tspan fill="#6c63ff">6 GPU</tspan>,</text>
  <text x="80" y="315" font-family="system-ui,sans-serif" font-size="44" font-weight="700" fill="#c5c8d6">voici ce qui marche vraiment</text>

  <!-- Stats row -->
  <rect x="80" y="370" width="220" height="90" rx="10" fill="rgba(108,99,255,0.1)" stroke="#252a3a" stroke-width="1"/>
  <text x="190" y="408" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#6c63ff" text-anchor="middle">95</text>
  <text x="190" y="425" font-family="system-ui,sans-serif" font-size="13" fill="#6a7090" text-anchor="middle">tokens/sec max</text>
  <text x="190" y="445" font-family="system-ui,sans-serif" font-size="11" fill="#4a5068" text-anchor="middle">RTX 5090 · 70B Q4</text>

  <rect x="320" y="370" width="220" height="90" rx="10" fill="rgba(0,217,181,0.08)" stroke="#252a3a" stroke-width="1"/>
  <text x="430" y="408" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#00d9b5" text-anchor="middle">0€</text>
  <text x="430" y="425" font-family="system-ui,sans-serif" font-size="13" fill="#6a7090" text-anchor="middle">abonnement mensuel</text>
  <text x="430" y="445" font-family="system-ui,sans-serif" font-size="11" fill="#4a5068" text-anchor="middle">IA 100% locale</text>

  <rect x="560" y="370" width="220" height="90" rx="10" fill="rgba(245,166,35,0.08)" stroke="#252a3a" stroke-width="1"/>
  <text x="670" y="408" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#f5a623" text-anchor="middle">80%</text>
  <text x="670" y="425" font-family="system-ui,sans-serif" font-size="13" fill="#6a7090" text-anchor="middle">comparable à GPT-4o</text>
  <text x="670" y="445" font-family="system-ui,sans-serif" font-size="11" fill="#4a5068" text-anchor="middle">Qwen 3 32B</text>

  <!-- Right side GPU illustration -->
  <rect x="900" y="120" width="210" height="120" rx="12" fill="#12151f" stroke="#6c63ff" stroke-width="2"/>
  <text x="1005" y="165" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#6c63ff" text-anchor="middle">★ SWEET SPOT 2026</text>
  <text x="1005" y="188" font-family="system-ui,sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">RTX 5070 Ti</text>
  <text x="1005" y="208" font-family="system-ui,sans-serif" font-size="13" fill="#6a7090" text-anchor="middle">16 Go · 58 t/s · ~700€</text>

  <rect x="900" y="260" width="210" height="100" rx="12" fill="#12151f" stroke="#252a3a" stroke-width="1"/>
  <text x="1005" y="295" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#f5a623" text-anchor="middle">BUDGET</text>
  <text x="1005" y="315" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">RTX 4060 Ti 16 Go</text>
  <text x="1005" y="335" font-family="system-ui,sans-serif" font-size="12" fill="#6a7090" text-anchor="middle">18 t/s · ~380€</text>

  <rect x="900" y="380" width="210" height="100" rx="12" fill="#12151f" stroke="#252a3a" stroke-width="1"/>
  <text x="1005" y="415" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#6c63ff" text-anchor="middle">PRO</text>
  <text x="1005" y="435" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">RTX 4090 24 Go</text>
  <text x="1005" y="455" font-family="system-ui,sans-serif" font-size="12" fill="#6a7090" text-anchor="middle">68 t/s · ~1700€</text>

  <!-- Footer -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="606" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#ffffff">EchosIvoire</text>
  <text x="80" y="624" font-family="system-ui,sans-serif" font-size="12" fill="#6a7090">echosivoire.github.io/-chos</text>
  <text x="1120" y="606" font-family="system-ui,sans-serif" font-size="13" fill="#6a7090" text-anchor="end">Benchmarks réels · Mai 2026</text>
  <text x="1120" y="622" font-family="system-ui,sans-serif" font-size="11" fill="#4a5068" text-anchor="end">6 GPU testés · Ollama · Qwen 3 · Llama 3.3</text>
</svg>
